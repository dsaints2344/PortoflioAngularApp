<section class="page container hero">
  <div class="hero-copy">
    <p class="hero-hi"><span class="wave">👋</span>{{ profile().greeting }}</p>
    <h1>My name is <br /><span class="grad">{{ profile().name }}</span></h1>
    <p class="hero-role">{{ profile().role }}</p>
    <p class="hero-sub">{{ profile().tagline }}</p>
    <div class="hero-cta">
      <a class="btn btn-primary" routerLink="/contact">
        <app-icon name="mail" [size]="18" />Get in touch
      </a>
    </div>
    <div class="hero-stats">
      @for (stat of profile().stats; track stat.label) {
        <div class="hero-stat">
          <b>{{ stat.value }}</b>
          <span>{{ stat.label }}</span>
        </div>
      }
    </div>
  </div>

  <div class="hero-photo-wrap">
    <div class="hero-ring"></div>
    <div class="hero-blob"></div>
    <div class="hero-photo" [style.background-image]="'url(' + profile().photoUrl + ')'"></div>
  </div>
</section>
