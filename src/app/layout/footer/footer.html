<footer class="site-footer">
  <div class="footer-in">
    <span class="copy">{{ copy() }}</span>
    <div class="footer-socials">
      <a
        class="icon-btn"
        [href]="socials().linkedinUrl"
        aria-label="LinkedIn"
        (click)="socials().linkedinUrl === '#' && $event.preventDefault()"
      >
        <app-icon name="linkedin" [size]="20" />
      </a>
      <a
        class="icon-btn"
        [href]="socials().githubUrl"
        target="_blank"
        rel="noreferrer"
        aria-label="GitHub"
      >
        <app-icon name="github" [size]="20" />
      </a>
    </div>
  </div>
</footer>
